<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="favicon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <link rel="manifest" href="./m_manifest.json">
    <meta name="theme-color" content="#15466e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="법인카드">
    <title>법인카드 식대 · 모바일</title>
    <style>
        :root {
            --ink: #102234;
            --muted: #6b7682;
            --line: #dde3ec;
            --leaf: #15466e;
            --leaf-dark: #0e3050;
            --amber: #e8a820;
            --amber-dark: #c27b00;
            --paper: #fcfdff;
            --danger: #dc2626;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
        }

        body {
            min-height: 100vh;
            color: var(--ink);
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at 12% 4%, rgba(232, 168, 32, 0.18), transparent 18rem),
                radial-gradient(circle at 90% 6%, rgba(21, 70, 110, 0.16), transparent 16rem),
                linear-gradient(160deg, #eef2f8 0%, #f4f6fa 55%, #fbfcff 100%);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }

        button {
            font: inherit;
            border: 0;
            cursor: pointer;
            background: none;
            color: inherit;
        }

        input,
        select {
            font: inherit;
        }

        /* iOS: 16px 미만이면 포커스 시 자동 줌 → 모든 입력 16px 이상 */
        input,
        select,
        textarea {
            font-size: 16px;
        }

        .hidden {
            display: none !important;
        }

        /* ── 앱 셸 ── */
        .app {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 14px calc(96px + var(--safe-bottom));
        }

        /* ── 상단 앱바 ── */
        .appbar {
            position: sticky;
            top: 0;
            z-index: 30;
            margin: 0 -14px 12px;
            padding: calc(var(--safe-top) + 10px) 16px 12px;
            background: rgba(252, 253, 255, 0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }

        .appbar-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        .appbar-title .tag {
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            color: #fff;
            background: var(--leaf);
            padding: 2px 7px;
            border-radius: 999px;
        }

        .month-nav {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .month-nav .label {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .iconbtn {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 1px solid var(--line);
            color: var(--ink);
            font-size: 1.1rem;
            font-weight: 800;
        }

        .iconbtn:active {
            background: #e8eef6;
        }

        .today-chip {
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 800;
            background: var(--amber);
            color: var(--ink);
        }

        .today-chip:active {
            background: var(--amber-dark);
            color: #fff;
        }

        /* ── 통계 스트립 ── */
        .stats {
            display: grid;
            grid-template-columns: 1.3fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 12px 12px 11px;
            box-shadow: 0 8px 24px rgba(16, 34, 52, 0.06);
        }

        .stat .k {
            font-size: 0.68rem;
            font-weight: 800;
            color: var(--muted);
        }

        .stat .v {
            margin-top: 4px;
            font-size: 1.12rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .stat .v.green {
            color: var(--leaf);
        }

        .stat .v.amber {
            color: var(--amber-dark);
        }

        /* ── 큰 스캔 버튼 ── */
        .scan-cta {
            width: 100%;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--leaf), var(--leaf-dark));
            color: #fff;
            box-shadow: 0 14px 30px rgba(14, 48, 80, 0.28);
        }

        .scan-cta:active {
            transform: translateY(1px);
        }

        .scan-cta .emoji {
            font-size: 1.7rem;
            line-height: 1;
        }

        .scan-cta .t1 {
            font-size: 1.02rem;
            font-weight: 800;
        }

        .scan-cta .t2 {
            font-size: 0.74rem;
            opacity: 0.9;
            margin-top: 2px;
        }

        .scan-cta .arrow {
            margin-left: auto;
            font-size: 1.3rem;
            font-weight: 800;
            opacity: 0.85;
        }

        /* ── 기본 인원 설정 바 ── */
        .setbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 9px 14px;
        }

        .setbar .lbl {
            font-size: 0.74rem;
            font-weight: 800;
            color: var(--muted);
            flex-shrink: 0;
        }

        .setbar input {
            flex: 1;
            min-width: 0;
            border: 0;
            outline: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
        }

        .setbar input::placeholder {
            color: #aeb6c2;
        }

        .setbar .saved {
            font-size: 0.68rem;
            font-weight: 800;
            color: var(--leaf);
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .setbar .saved.show {
            opacity: 1;
        }

        /* ── 검색 ── */
        .search {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 11px 14px;
        }

        .search input {
            flex: 1;
            min-width: 0;
            border: 0;
            outline: none;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
        }

        .search input::placeholder {
            color: var(--muted);
            opacity: 0.75;
        }

        .search .clr {
            color: var(--muted);
            font-weight: 800;
            padding: 8px 10px;
            margin: -8px -4px -8px 0;
            border-radius: 999px;
        }

        /* ── 달력 ── */
        .card {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid var(--line);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 14px 40px rgba(16, 34, 52, 0.08);
        }

        .cal-head,
        .cal-body {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .cal-head {
            background: #e8eef6;
            border-bottom: 1px solid var(--line);
            padding: 8px 0;
            text-align: center;
        }

        .cal-head div {
            font-size: 0.62rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .cal-head .sun {
            color: #ef4444;
        }

        .cal-head .sat {
            color: #3b82f6;
        }

        .cell {
            min-height: 56px;
            padding: 5px 4px 6px;
            text-align: left;
            border-right: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 2px;
            background: rgba(255, 255, 255, 0.4);
        }

        .cell:nth-child(7n) {
            border-right: 0;
        }

        .cell.blank {
            background: rgba(238, 242, 248, 0.45);
        }

        .cell.weekend {
            background: rgba(241, 244, 249, 0.7);
        }

        .cell.today {
            background: #e9f1fb;
        }

        .cell:active:not(.blank) {
            background: #fdf3d8;
        }

        .cell .dn {
            align-self: flex-start;
            min-width: 22px;
            height: 22px;
            padding: 0 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.74rem;
            font-weight: 800;
            color: var(--muted);
            border-radius: 999px;
        }

        .cell.today .dn {
            background: var(--leaf);
            color: #fff;
        }

        .cell .dn.sun,
        .cell .dn.holi {
            color: #ef4444;
        }

        .cell .dn.sat {
            color: #3b82f6;
        }

        .cell .amt {
            font-size: 0.66rem;
            font-weight: 800;
            color: var(--ink);
            line-height: 1.15;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cell .cnt {
            font-size: 0.58rem;
            font-weight: 800;
            color: var(--amber-dark);
        }

        .cell .holi-name {
            font-size: 0.54rem;
            font-weight: 800;
            color: #ef4444;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cell .dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: var(--leaf);
            margin-top: 1px;
        }

        /* ── 이번 달 기록 리스트 ── */
        .section-title {
            margin: 18px 4px 8px;
            font-size: 0.82rem;
            font-weight: 800;
            color: var(--muted);
        }

        .rec {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--line);
            border-radius: 16px;
            margin-bottom: 8px;
        }

        .rec:active {
            background: #fdf3d8;
        }

        .rec .d {
            flex-shrink: 0;
            width: 46px;
            text-align: center;
        }

        .rec .d .dd {
            font-size: 1.15rem;
            font-weight: 800;
            line-height: 1;
        }

        .rec .d .dw {
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--muted);
            margin-top: 2px;
        }

        .rec .d .dw.sun {
            color: #ef4444;
        }

        .rec .d .dw.sat {
            color: #3b82f6;
        }

        .rec .mid {
            flex: 1;
            min-width: 0;
        }

        .rec .mid .a {
            font-size: 0.98rem;
            font-weight: 800;
        }

        .rec .mid .s {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .rec .mid .s .ppl {
            color: var(--leaf);
            font-weight: 700;
        }

        .rec .chev {
            color: #cbd5e1;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .empty {
            text-align: center;
            color: #aeb6c2;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 22px 0;
        }

        /* ── 하단 데이터 바 ── */
        .databar {
            display: flex;
            gap: 8px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .databar button,
        .databar label {
            flex: 1;
            min-width: 0;
            text-align: center;
            padding: 11px 8px;
            border-radius: 14px;
            font-size: 0.76rem;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--line);
            color: var(--ink);
        }

        .databar .primary {
            background: var(--leaf);
            color: #fff;
            border-color: var(--leaf);
        }

        .databar .dark {
            background: var(--ink);
            color: #fff;
            border-color: var(--ink);
        }

        /* ── 바텀시트(모달) 공통 ── */
        .sheet-scrim {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.22s ease;
        }

        .sheet-scrim.show {
            opacity: 1;
        }

        .sheet {
            width: 100%;
            max-width: 560px;
            max-height: calc(92vh - var(--safe-top));
            max-height: calc(92dvh - var(--safe-top));
            overflow-x: hidden;
            overflow-y: auto;
            background: var(--paper);
            border-radius: 24px 24px 0 0;
            padding: 8px 18px calc(18px + var(--safe-bottom));
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.25);
            transform: translateY(100%);
            transition: transform 0.26s cubic-bezier(.2, .8, .2, 1), height 0.26s cubic-bezier(.2, .8, .2, 1), border-radius 0.2s ease;
            scrollbar-width: none;
        }

        /* 위로 끌어 올렸을 때: 전체화면 확대(바닥 고정 → 빈틈 없음) */
        .sheet.expanded {
            height: 100%;
            max-height: 100%;
            border-radius: 0;
            padding-top: calc(8px + var(--safe-top));
        }

        .sheet::-webkit-scrollbar {
            display: none;
        }

        .sheet-scrim.show .sheet {
            transform: translateY(0);
        }

        .grabber {
            position: relative;
            width: 42px;
            height: 5px;
            border-radius: 999px;
            background: #d4dde8;
            margin: 4px auto 12px;
            touch-action: none;
            cursor: grab;
        }

        .grabber:active {
            cursor: grabbing;
        }

        .grabber::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 38px;
        }

        .sheet-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            cursor: grab;
        }

        .sheet-head:active {
            cursor: grabbing;
        }

        .sheet-head .x {
            cursor: pointer;
        }

        .sheet-head .eyebrow {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--leaf);
        }

        .sheet-head h3 {
            margin: 3px 0 0;
            font-size: 1.32rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .x {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            color: var(--muted);
            font-size: 1.4rem;
            font-weight: 800;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .x:active {
            background: #e8eef6;
        }

        /* ── 폼 ── */
        .field {
            margin-bottom: 13px;
        }

        .field>label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .field input,
        .field select {
            width: 100%;
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 14px;
            padding: 13px 14px;
            font-weight: 600;
            outline: none;
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--leaf);
            box-shadow: 0 0 0 4px rgba(14, 48, 80, 0.1);
        }

        .field input.big {
            font-size: 1.25rem;
            font-weight: 800;
        }

        /* iOS: time/date/number 입력이 고유 너비로 칸을 넘치는 것 방지 */
        .field input[type="time"],
        .field input[type="date"],
        .field input[type="datetime-local"],
        .field input[type="number"] {
            -webkit-appearance: none;
            appearance: none;
            min-width: 0;
            max-width: 100%;
        }

        .field input[type="time"]::-webkit-date-and-time-value {
            text-align: left;
            margin: 0;
        }

        .field input[type="number"]::-webkit-inner-spin-button,
        .field input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .field .hint {
            margin-top: 6px;
            font-size: 0.72rem;
            color: var(--muted);
            font-weight: 500;
        }

        .field .preview {
            margin-top: 6px;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--leaf);
        }

        .row2 {
            display: flex;
            gap: 10px;
        }

        .row2>* {
            flex: 1;
            min-width: 0;
        }

        .btnbar {
            display: flex;
            gap: 10px;
            padding-top: 6px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 16px;
            font-size: 0.92rem;
            font-weight: 800;
            text-align: center;
        }

        .btn.ghost {
            background: #e8edf3;
            color: var(--ink);
        }

        .btn.ghost:active {
            background: #dde5ee;
        }

        .btn.go {
            background: var(--leaf);
            color: #fff;
        }

        .btn.go:active {
            background: var(--leaf-dark);
        }

        .btn.del {
            background: #fef2f2;
            color: var(--danger);
        }

        .btn.del:active {
            background: #fee2e2;
        }

        /* ── 모달 내 등록 기록 리스트 ── */
        .entry-list {
            margin-bottom: 16px;
        }

        .entry-list .lbl {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .ei {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            border-radius: 14px;
            background: #eef2f7;
            margin-bottom: 8px;
        }

        .ei.active {
            background: #e9f1fb;
            box-shadow: 0 0 0 1.5px var(--leaf);
        }

        .ei .info {
            flex: 1;
            min-width: 0;
        }

        .ei .info .top {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .ei .info .a {
            font-size: 0.95rem;
            font-weight: 800;
        }

        .ei .info .tm {
            font-size: 0.72rem;
            color: var(--muted);
            font-weight: 600;
        }

        .ei .info .pp {
            display: block;
            margin-top: 2px;
            font-size: 0.74rem;
            font-weight: 700;
            color: var(--leaf);
        }

        .ei .info .mt {
            display: block;
            margin-top: 2px;
            font-size: 0.72rem;
            color: var(--muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ei .acts {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .mini {
            min-height: 40px;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.74rem;
            font-weight: 800;
        }

        .mini.edit {
            background: #fff;
            border: 1px solid var(--line);
            color: var(--ink);
        }

        .mini.del {
            background: #fef2f2;
            color: var(--danger);
        }

        .divider {
            height: 1px;
            background: var(--line);
            margin: 14px 0;
        }

        /* ── OCR 스캔 시트 ── */
        .ocr-intro {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 500;
            line-height: 1.55;
            margin-bottom: 14px;
        }

        .ocr-status {
            border-radius: 14px;
            background: #eef2f7;
            padding: 13px 14px;
            margin-bottom: 12px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--ink);
        }

        .ocr-status .bar {
            height: 7px;
            border-radius: 999px;
            background: #e2e8f0;
            margin-top: 9px;
            overflow: hidden;
        }

        .ocr-status .bar>i {
            display: block;
            height: 100%;
            width: 0;
            background: var(--leaf);
            border-radius: 999px;
            transition: width 0.25s ease;
        }

        .ocr-status.err {
            background: #fef2f2;
            color: var(--danger);
        }

        .ocr-thumbs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .ocr-thumbs img {
            width: 54px;
            height: 54px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--line);
        }

        /* OCR 결과 카드 */
        .rcard {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: #fff;
            padding: 14px;
            margin-bottom: 12px;
        }

        .rcard.saved {
            opacity: 0.55;
        }

        .rcard .rc-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .rcard .rc-head .rc-date {
            font-size: 1.05rem;
            font-weight: 800;
        }

        .rcard .rc-head .rc-amt {
            margin-left: auto;
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--leaf);
        }

        .badge {
            font-size: 0.6rem;
            font-weight: 800;
            padding: 3px 7px;
            border-radius: 999px;
        }

        .badge.ok {
            background: #e6eef9;
            color: var(--leaf-dark);
        }

        .badge.fix {
            background: #fff3da;
            color: var(--amber-dark);
        }

        .badge.multi {
            background: #eef3fb;
            color: #2563eb;
        }

        .badge.dup {
            background: #fdecec;
            color: #c0392b;
        }

        .rc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 9px;
        }

        .rc-grid .rf {
            display: flex;
            flex-direction: column;
            min-width: 0;
            /* 그리드 칸이 입력 고유폭 때문에 안 줄어드는 것 방지(iOS date/time 넘침) */
        }

        .rc-grid .rf.full {
            grid-column: 1 / -1;
        }

        .rc-grid .rf label {
            font-size: 0.66rem;
            font-weight: 800;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .rc-grid .rf input {
            border: 1px solid var(--line);
            border-radius: 11px;
            padding: 9px 11px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            outline: none;
        }

        .rc-grid .rf input:focus {
            border-color: var(--leaf);
        }

        /* iOS: date/time/number 입력이 고유 너비로 그리드 칸을 넘치는 것 방지 */
        .rc-grid .rf input[type="date"],
        .rc-grid .rf input[type="time"],
        .rc-grid .rf input[type="datetime-local"],
        .rc-grid .rf input[type="number"] {
            -webkit-appearance: none;
            appearance: none;
            min-width: 0;
            max-width: 100%;
        }

        .rc-grid .rf input[type="date"]::-webkit-date-and-time-value,
        .rc-grid .rf input[type="time"]::-webkit-date-and-time-value {
            text-align: left;
            margin: 0;
        }

        .rc-grid .rf input[type="number"]::-webkit-inner-spin-button,
        .rc-grid .rf input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .rc-raw {
            margin-top: 10px;
        }

        .rc-raw summary {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--muted);
            cursor: pointer;
        }

        .rc-raw pre {
            margin: 8px 0 0;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.66rem;
            line-height: 1.4;
            color: #5a6573;
            background: #eef2f7;
            border-radius: 10px;
            padding: 10px;
            max-height: 160px;
            overflow: auto;
        }

        .rc-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .rc-actions .btn {
            padding: 11px;
            font-size: 0.84rem;
        }

        /* ── 토스트 ── */
        #toast {
            position: fixed;
            left: 50%;
            bottom: calc(24px + var(--safe-bottom));
            transform: translateX(-50%) translateY(12px);
            z-index: 100;
            max-width: 90vw;
            padding: 12px 20px;
            border-radius: 16px;
            background: var(--ink);
            color: #fff;
            font-size: 0.86rem;
            font-weight: 800;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            text-align: center;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.warn {
            background: var(--amber-dark);
        }

        #toast.error {
            background: #b91c1c;
        }
    </style>
</head>

<body>

        <!-- 달력 -->
        <div id="calendar-wrap">

        </div>

    <!-- ══════════ 일자 입력 바텀시트 ══════════ -->
    <div id="entry-scrim" class="sheet-scrim hidden" role="dialog" aria-modal="true" aria-labelledby="entry-title">

                        inputmode="numeric" placeholder="선택"></div>

    <!-- ══════════ OCR 스캔 바텀시트 ══════════ -->
    <div id="ocr-scrim" class="sheet-scrim hidden" role="dialog" aria-modal="true" aria-labelledby="ocr-title">
        <div class="sheet" id="ocr-sheet">
            <div class="grabber"></div>
            <div class="sheet-head">
                <div>
                    <div class="eyebrow">영수증 OCR</div>
                    <h3 id="ocr-title">영수증 스캔</h3>
                </div>
                <button id="ocr-x" class="x" aria-label="닫기">×</button>
            </div>

            <p class="ocr-intro">
                영수증 사진을 여러 장 올리면 <b>같은 영수증은 자동으로 묶어</b> 인식 결과를 종합하고,
                금액은 <b>승인 = 공급 + 부가세</b> 규칙으로 어긋난 값을 보정합니다.
                같은 영수증을 2~3장 찍어 올릴수록 정확해집니다.

            <input type="file" id="ocr-gallery" accept="image/*" multiple class="hidden">

            <div id="ocr-saveall-wrap" class="btnbar hidden">
